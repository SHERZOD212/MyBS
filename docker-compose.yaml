
services:
  postgres_service:
    image: postgres:alpine
    env_file: .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    networks:
      - mybs_network

  backend_service:
    build: .
    env_file: .env
    volumes:
      - media:/app/media
    ports:
      - "8000:8000"
    depends_on:
      - postgres_service
    networks:
      - mybs_network

  frontend_service:
    build: ./front
    volumes:
      - ./front:/usr/share/nginx/html/
    ports:
      - "3000:80"
    depends_on:
      - backend_service
    networks:
      - mybs_network

volumes:
  media:
  pgdata:

networks:
  mybs_network:
    driver: bridge