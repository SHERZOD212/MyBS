<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>АвтоПарк — Вход в систему</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root[data-theme="dark"] {
    --bg: #0d0f12;
    --bg2: #13161c;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.15);
    --accent: #f5a623;
    --text: #e8e6e0;
    --muted: #7a7870;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7;
    --bg2: #ffffff;
    --border: rgba(0,0,0,0.08);
    --border2: rgba(0,0,0,0.15);
    --accent: #e67e22;
    --text: #1a1a1a;
    --muted: #626567;
  }
  :root {
    --mono: 'IBM Plex Mono', monospace;
    --sans: 'IBM Plex Sans', sans-serif;
    --display: 'Bebas Neue', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    transition: background 0.3s, color 0.3s;
  }

  .login-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 6px;
    width: 100%;
    max-width: 400px;
    padding: 40px 32px;
    box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    position: relative;
  }

  .login-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: var(--accent);
    border-radius: 6px 6px 0 0;
  }

  .logo {
    font-family: var(--display);
    font-size: 32px;
    letter-spacing: 3px;
    color: var(--accent);
    text-align: center;
    margin-bottom: 8px;
  }
  .logo span { color: var(--text); }

  .subtitle {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-align: center;
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 32px;
  }

  .form-group {
    margin-bottom: 20px;
  }

  .form-label {
    display: block;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 8px;
  }

  .form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border2);
    color: var(--text);
    font-family: var(--mono);
    font-size: 14px;
    padding: 12px 16px;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
  }

  .btn-submit {
    width: 100%;
    background: var(--accent);
    color: #000;
    border: none;
    font-family: var(--mono);
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1px;
    padding: 14px;
    border-radius: 4px;
    cursor: pointer;
    margin-top: 10px;
    transition: opacity 0.2s;
  }
  .btn-submit:hover {
    opacity: 0.9;
  }
</style>
</head>
<body>

<div class="login-card">
  <div class="logo">АВТО<span>ПАРК</span></div>
  <div class="subtitle">Система управления · Авторизация</div>

  <form action="/login/" method="POST">
    <!-- Если используете Django, не забудьте добавить {% csrf_token %} -->
    <div class="form-group">
      <label class="form-label" for="username">Логин / Идентификатор</label>
      <input type="text" id="username" name="username" class="form-input" required autocomplete="username" autofocus>
    </div>

    <div class="form-group">
      <label class="form-label" for="password">Пароль</label>
      <input type="password" id="password" name="password" class="form-input" required autocomplete="current-password">
    </div>

    <button type="submit" class="btn-submit">Войти в систему</button>
  </form>
</div>

<script>
  // Скрипт считывает тему из localStorage, чтобы страница логина соответствовала выбранной теме
  const savedTheme = localStorage.getItem('theme') || 'dark';
  document.documentElement.setAttribute('data-theme', savedTheme);
</script>
</body>
</html>
